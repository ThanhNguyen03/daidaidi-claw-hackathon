# Agent Configuration
# ===================
# This file defines the available agents and their configurations.
# Adding/removing agents is done by editing this file.
#
# Schema (per DAY_2 §4 + B.6):
#   name: Display name
#   model: Env var key (e.g., MODEL_ORCHESTRATOR)
#   role: One-line routing description
#   enabled: true/false
#   kind: generator | advisory | reviewer (how the orchestrator uses the agent)
#   hooks: [hook_name, ...] (optional, for reviewer agents)
#   critical: true/false (B.5 failure policy)

agents:
  orchestrator:
    name: "Orchestrator"
    model: MODEL_ORCHESTRATOR
    role: "Supervisor that routes requests and manages flow"
    enabled: true
    kind: generator
    critical: true

  tech_solution:
    name: "Tech Solution"
    model: MODEL_TECH_SOLUTION
    role: "Technical recommendations and solutions"
    enabled: true
    kind: generator
    critical: false

  market_strategy:
    name: "Market Strategy"
    model: MODEL_MARKET_STRATEGY
    role: "Market analysis and sales strategy"
    enabled: true
    kind: generator
    critical: false

  account:
    name: "Account"
    model: MODEL_ACCOUNT
    role: "Pricing and quotations"
    enabled: true
    kind: generator
    critical: false

  adtimabox:
    name: "AdtimaBox"
    model: MODEL_ADTIMABOX
    role: "Adtima platform integration"
    enabled: true
    kind: generator
    critical: false

  design:
    name: "Design"
    model: MODEL_DESIGN
    role: "Wireframes and visual design"
    enabled: true
    kind: generator
    critical: false

  # A6 — Content generator (Group 2, sequential after Group-1 parallel)
  content_generator:
    name: "Content Generator"
    model: MODEL_CONTENT_GENERATOR
    role: "Proposal content writer — synthesises strategy, compliance and product analysis into a persuasive narrative"
    enabled: true
    kind: generator
    critical: true

  # A9 — Client simulator (Group 3, after account + design; per workflow diagram)
  client_simulator:
    name: "Client Simulator"
    model: MODEL_CLIENT_SIMULATOR
    role: "Simulates client pushback: identifies weak points in the proposal, flags objections and risks before AE review"
    enabled: true
    kind: reviewer
    critical: false

  # Day 2 B.6: Compliance as the first reviewer agent
  compliance:
    name: "Compliance"
    model: MODEL_COMPLIANCE
    role: "Policy & compliance advisor: flags policy risks in proposals/quotes, suggests compliant alternatives"
    enabled: true
    kind: reviewer
    hooks: [pre_checkpoint_review]
    critical: false

# Validation agent (used for pre-pass validation - outside agents block)
validation:
  name: "Validation"
  model: MODEL_VALIDATION
  role: "Fast validation pre-pass"
  description: "Gemma-4 powered validation to detect missing fields and ambiguities"